name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Buat folder SourceFile dan taruh file PDF dummy untuk pengujian
    - name: Prepare Source Directory
      run: |
        mkdir -p ./SourceFile
        # Membuat file PDF kosong untuk memastikan aplikasi memiliki bahan yang mau digabung
        echo "PDF Dummy 1" > ./SourceFile/test1.pdf
        echo "PDF Dummy 2" > ./SourceFile/test2.pdf
        echo "=== Isi folder SourceFile ==="
        ls -la ./SourceFile

    # Langkah 2: Berikan izin akses eksekusi & hapus blokir keamanan Apple
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod +x ./Mac-App-Output/merge_script.app/Contents/MacOS/*
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Jalankan aplikasi menggunakan monitor virtual agar tidak crash (PENTING)
    - name: Run macOS Application with Virtual Display
      run: |
        # Mengaktifkan layar virtual Xcode Simulators agar aplikasi UI bisa berjalan tanpa layar fisik
        sudo /usr/libexec/ConfigureSafeBoot
        
        # Jalankan aplikasi Anda dan simpan catatan error-nya ke berkas log
        ./Mac-App-Output/merge_script.app/Contents/MacOS/* > aplikasi_output.log 2>&1 || true

    # Langkah 4: Jika folder MergeOut tidak ada, langkah ini akan membaca mengapa aplikasinya error
    - name: Debug - Baca Penyebab Aplikasi Error
      run: |
        echo "=== CATATAN SYSTEM LOG APLIKASI ==="
        cat aplikasi_output.log || echo "Tidak ada catatan log."
        echo ""
        echo "=== STRUKTUR FOLDER SAAT INI ==="
        ls -R .

    # Langkah 5: Mengunggah hasil folder MergeOut (di mana pun ia tercipta)
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: |
          **/MergeOut/
          **/MergeOut/*.pdf
        if-no-files-found: warn # Mengubah ke 'warn' agar workflow tidak langsung merah/gagal jika folder kosong
