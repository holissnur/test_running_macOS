name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Membuat file PDF pengujian yang valid & terbaca oleh sistem aplikasi Anda
    - name: Prepare Source Directory with Valid PDFs
      run: |
        mkdir -p ./SourceFile
        # Mengonversi teks menjadi file PDF asli menggunakan perkakas bawaan macOS (enscript & pstopdf)
        echo "Halaman Dokumen Pertama" | enscript -o - | pstopdf -i -o ./SourceFile/test1.pdf
        echo "Halaman Dokumen Kedua" | enscript -o - | pstopdf -i -o ./SourceFile/test2.pdf
        echo "=== Isi folder SourceFile ==="
        ls -la ./SourceFile

    # Langkah 2: Membuka proteksi keamanan macOS khusus untuk merge_script
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod -R +x ./Mac-App-Output/merge_script.app/
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Menjalankan aplikasi langsung ke berkas biner utamanya
    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/merge_script

    # Langkah 4: Memastikan isi file di dalam MergeOut sudah tercipta
    - name: Debug - Cek Hasil PDF di MergeOut
      run: |
        echo "=== Isi Berkas di Dalam Folder MergeOut ==="
        ls -la ./MergeOut

    # Langkah 5: Mengunggah folder MergeOut ke tab Artifacts GitHub
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: ./MergeOut/
        if-no-files-found: error # Mengembalikan ke 'error' untuk menjamin file wajib ada
