name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 2: Memberikan izin akses eksekusi pada aplikasi macOS Anda
    - name: Set execute permission for Mac App
      run: |
        chmod +x ./Mac-App-Output/merge_script.app/Contents/MacOS/*

    # Langkah 3: Menjalankan aplikasi untuk menggabungkan PDF dari SourceFile ke MergeOut
    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/*

    # Langkah 4: Debug untuk memastikan folder MergeOut berhasil dibuat dan berisi PDF
    - name: Debug - Periksa isi folder MergeOut
      run: |
        echo "=== Isi Folder MergeOut ==="
        ls -la ./MergeOut || echo "Folder MergeOut tidak ditemukan"

    # Langkah 5: Mengunggah folder MergeOut yang berisi file PDF hasil gabungan
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: ./MergeOut/
        if-no-files-found: error
