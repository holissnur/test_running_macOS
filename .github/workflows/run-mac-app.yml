name: Jalankan Mac App dan Ambil PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set execute permission for Mac App
      run: |
        chmod +x ./Mac-App-Output/merge_script.app/Contents/MacOS/*

    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/*

    # Langkah pelacakan otomatis jika terjadi error pada lokasi file
    - name: Debug - Cari file PDF di dalam workspace
      run: |
        echo "=== Mencari file PDF yang berhasil dibuat ==="
        find . -name "*.pdf"

    - name: Upload Output Folder and PDF Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-dan-output
        path: ./Mac-App-Output/
        if-no-files-found: error
