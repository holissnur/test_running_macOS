name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Buat folder SourceFile di root dan pastikan isinya terbaca
    - name: Prepare Source Directory
      run: |
        mkdir -p ./SourceFile
        echo "=== Isi folder SourceFile sebelum aplikasi berjalan ==="
        ls -la ./SourceFile

    # Langkah 2: Berikan hak eksekusi DAN hilangkan status karantina macOS (Bypass Gatekeeper)
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod +x ./Mac-App-Output/merge_script.app/Contents/MacOS/*
        # Menghapus flag karantina Apple agar aplikasi tidak diblokir secara diam-diam
        xattr -dr com.apple.quarantine ./Mac-App-Output/NamaAplikasiAnda.app || true

    # Langkah 3: Jalankan aplikasi di dalam direktori kerja yang tepat
    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/*

    # Langkah 4: Pencarian cerdas lokasi folder MergeOut jika posisinya bergeser
    - name: Debug - Cari folder MergeOut di seluruh workspace
      run: |
        echo "=== Memeriksa apakah MergeOut ada di Root ==="
        ls -la ./MergeOut || true
        echo "=== Memeriksa apakah MergeOut ada di Mac-App-Output ==="
        ls -la ./Mac-App-Output/MergeOut || true
        echo "=== Pencarian menyeluruh folder bernama MergeOut ==="
        find . -type d -name "MergeOut"

    # Langkah 5: Mengunggah hasil menggunakan pola pencarian fleksibel (**/*)
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        # Menggunakan pola wildcard agar tetap terunggah di mana pun folder MergeOut dibuat
        path: |
          **/MergeOut/
          **/MergeOut/*.pdf
        if-no-files-found: error
