name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Memastikan folder SourceFile di dalam Mac-App-Output terbaca dengan benar
    - name: Verify Source Directory
      run: |
        echo "=== Memeriksa file PDF di dalam Mac-App-Output/SourceFile ==="
        ls -la ./Mac-App-Output/SourceFile

    # Langkah 2: Membuka proteksi keamanan macOS khusus untuk merge_script
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod -R +x ./Mac-App-Output/merge_script.app/
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Menjalankan aplikasi penggabung PDF Anda
    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/merge_script

    # Langkah 4: Memastikan berkas keluaran sudah terisi di dalam MergeOut setelah aplikasi berjalan
    - name: Debug - Cek Hasil PDF di MergeOut
      run: |
        echo "=== Isi Berkas di Dalam Folder MergeOut ==="
        ls -la ./MergeOut || echo "Folder MergeOut di root tidak ditemukan"
        echo "=== Cek apakah MergeOut dibuat di dalam Mac-App-Output ==="
        ls -la ./Mac-App-Output/MergeOut || echo "Folder MergeOut di Mac-App-Output tidak ditemukan"

    # Langkah 5: Mengunggah folder MergeOut ke Artifacts GitHub (Mencari di semua lokasi)
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: |
          **/MergeOut/
          **/MergeOut/*.pdf
        if-no-files-found: error
