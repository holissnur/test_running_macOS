name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Memeriksa ketersediaan file PDF asli di dalam repositori
    - name: Verify Source Directory
      run: |
        echo "=== Memeriksa file PDF di dalam Mac-App-Output/SourceFile ==="
        ls -la ./Mac-App-Output/SourceFile

    # Langkah 2: Membuka proteksi keamanan macOS khusus untuk merge_script
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod -R +x ./Mac-App-Output/merge_script.app/
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Menjalankan aplikasi penggabung PDF Anda
    - name: Run macOS Application
      run: |
        ./Mac-App-Output/merge_script.app/Contents/MacOS/merge_script

    # Langkah 4: Memastikan berkas keluaran sudah terisi di dalam MergeOut
    - name: Debug - Cek Hasil PDF di MergeOut
      run: |
        echo "=== Isi Berkas di Dalam Folder MergeOut ==="
        ls -la ./MergeOut

    # Langkah 5: Mengunggah folder MergeOut menggunakan jalur tunggal yang valid
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: ./MergeOut
        if-no-files-found: error
        include-hidden-files: true # Memastikan berkas PDF terdeteksi sistem unggah v4
