name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Memeriksa ketersediaan file PDF asli di dalam repositori
    - name: Verify Source Directory
      run: |
        echo "=== Memeriksa file PDF di dalam Mac-App-Output/SourceFile ==="
        ls -la ./Mac-App-Output/SourceFile

    # Langkah 2: Membuka proteksi keamanan macOS khusus untuk merge_script
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod -R +x ./Mac-App-Output/merge_script.app/
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Berpindah direktori ke folder biner asli sebelum menjalankan aplikasi
    - name: Run macOS Application from its Core Directory
      run: |
        # Berpindah ke folder biner utama agar aplikasi tidak bingung mencari jalan pulang
        cd ./Mac-App-Output/merge_script.app/Contents/MacOS/
        
        # Jalankan aplikasi Anda
        ./merge_script

    # Langkah 4: Melacak di mana folder MergeOut tercipta secara mutlak
    - name: Debug - Cari folder MergeOut yang Baru Saja Dibuat
      run: |
        echo "=== Mencari semua folder bernama MergeOut di seluruh workspace ==="
        find . -type d -name "MergeOut"

    # Langkah 5: Mengunggah hasil folder MergeOut berdasarkan pencarian absolut
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        # Menggunakan pencarian bintang ganda yang sudah dibersihkan agar mencakup subfolder dalam .app
        path: "**/MergeOut"
        if-no-files-found: error
        include-hidden-files: true
