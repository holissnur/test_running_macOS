name: Jalankan Mac App Penggabung PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # Langkah 1: Menyiapkan folder SourceFile beserta file PDF uji coba
    - name: Prepare Source Directory
      run: |
        mkdir -p ./SourceFile
        echo "PDF Dummy 1" > ./SourceFile/test1.pdf
        echo "PDF Dummy 2" > ./SourceFile/test2.pdf
        echo "=== Isi folder SourceFile ==="
        ls -la ./SourceFile

    # Langkah 2: Membuka proteksi keamanan macOS khusus untuk merge_script
    - name: Bypass macOS Gatekeeper and Set Permissions
      run: |
        chmod -R +x ./Mac-App-Output/merge_script.app/
        xattr -dr com.apple.quarantine ./Mac-App-Output/merge_script.app || true

    # Langkah 3: Menjalankan aplikasi langsung ke berkas biner utamanya
    - name: Run macOS Application
      run: |
        # Mengeksekusi file biner asli di dalam folder macOS
        ./Mac-App-Output/merge_script.app/Contents/MacOS/merge_script > aplikasi_output.log 2>&1 || true

    # Langkah 4: Melacak hasil ekstraksi folder MergeOut dan membaca log jika terjadi error
    - name: Debug - Cari folder MergeOut dan Baca Catatan Sistem
      run: |
        echo "=== CATATAN LOG INTERNAL APLIKASI ==="
        cat aplikasi_output.log || echo "Tidak ada catatan log."
        echo ""
        echo "=== MENCARI LOKASI FOLDER MERGEOUT ==="
        find . -type d -name "MergeOut"
        echo ""
        echo "=== STRUKTUR DIREKTORI UTAMA ==="
        ls -la

    # Langkah 5: Mengunggah folder MergeOut beserta seluruh isi PDF hasil gabungan
    - name: Upload Merged PDF Output
      uses: actions/upload-artifact@v4
      with:
        name: hasil-pdf-gabungan
        path: |
          **/MergeOut/
          **/MergeOut/*.pdf
        if-no-files-found: warn
